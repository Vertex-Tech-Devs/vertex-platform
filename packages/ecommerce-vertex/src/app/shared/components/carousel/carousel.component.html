<div class="carousel-container" [style.--aspect-ratio]="carouselAspectRatio">
  <div
    class="carousel__slide"
    (touchstart)="onTouchStart($event)"
    (touchend)="onTouchEnd($event)"
    role="region"
    [attr.aria-label]="'Carrusel de imagen ' + (currentIndex + 1) + ' de ' + images.length"
    aria-roledescription="carousel"
  >
    @if (getRoute(currentImage)) {
      <a
        [routerLink]="getRoute(currentImage)"
        [queryParams]="getQueryParams(currentImage)"
        class="carousel__link"
        style="display: block; width: 100%; height: 100%"
      >
        <img
          [src]="currentImage?.imageUrl"
          [alt]="'Slide ' + (currentIndex + 1)"
          class="carousel__image"
          loading="lazy"
        />
      </a>
    } @else {
      <img
        [src]="currentImage?.imageUrl"
        [alt]="'Slide ' + (currentIndex + 1)"
        class="carousel__image"
        loading="lazy"
      />
    }
  </div>

  @if (showArrows && images.length > 1) {
    <button
      class="carousel__control carousel__control--prev"
      (click)="prevSlide()"
      aria-label="Imagen anterior"
      type="button"
    >
      <i class="bi bi-chevron-left" aria-hidden="true"></i>
    </button>
    <button
      class="carousel__control carousel__control--next"
      (click)="nextSlide()"
      aria-label="Siguiente imagen"
      type="button"
    >
      <i class="bi bi-chevron-right" aria-hidden="true"></i>
    </button>
  }

  @if (showIndicators && images.length > 1) {
    <nav class="carousel__indicators" role="tablist" aria-label="Navegación del carrusel">
      @for (image of images; track $index; let i = $index) {
        <button
          class="carousel__dot"
          [class.carousel__dot--active]="i === currentIndex"
          (click)="goToSlide(i)"
          [attr.aria-label]="'Ir a imagen ' + (i + 1)"
          [attr.aria-pressed]="i === currentIndex"
          role="tab"
          type="button"
        ></button>
      }
    </nav>
  }

  <div class="carousel__progress" [style.width.%]="slideProgress" aria-hidden="true"></div>
</div>
