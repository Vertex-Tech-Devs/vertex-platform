<div class="order-summary">
  <h3 class="order-summary__title">Resumen del Pedido</h3>
  <div class="order-summary__items">
    @if (items.length === 0) {
      <p class="order-summary__empty" role="status">Tu carrito está vacío.</p>
    }
    @for (item of items; track item.id) {
      <div class="order-summary__item">
        <img
          [src]="item.image || 'assets/images/placeholder.jpg'"
          [alt]="item.name"
          class="order-summary__item-image"
        />
        <div class="order-summary__item-details">
          <div class="order-summary__item-name">{{ item.name }}</div>
          <div class="order-summary__item-qty">Cantidad: {{ item.quantity }}</div>
        </div>
        <div class="order-summary__item-price">
          {{ item.price * item.quantity | currency: 'ARS' : '$' }}
        </div>
      </div>
    }
  </div>
  <div class="order-summary__total">
    <span class="order-summary__total-label">Total</span>
    <span class="order-summary__total-amount">{{ total | currency: 'ARS' : '$' }}</span>
  </div>
</div>
