<header class="header" [class.header--scrolled]="isScrolled()" role="banner">
  <div
    class="header__backdrop"
    [class.header__backdrop--active]="isMenuOpen()"
    (click)="closeMenu()"
    aria-hidden="true"
  ></div>

  <div class="header__container">
    <a routerLink="/shop" class="header__brand" aria-label="Ir al inicio">
      @if (logoUrl()) {
        <img [src]="logoUrl()" [alt]="storeName() || 'Logo de tienda'" class="header__brand-logo" />
      } @else {
        {{ storeName() }}
      }
    </a>

    <button
      class="header__toggle"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Menú de navegación"
    >
      <i class="bi" [ngClass]="isMenuOpen() ? 'bi-x-lg' : 'bi-list'" aria-hidden="true"></i>
    </button>

    <nav
      class="header__nav"
      [class.header__nav--open]="isMenuOpen()"
      aria-label="Navegación principal"
    >
      <a
        routerLink="/shop"
        routerLinkActive="header__nav-link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
        >Inicio</a
      >
      <a
        routerLink="/shop/catalog"
        routerLinkActive="header__nav-link--active"
        (click)="closeMenu()"
        >Productos</a
      >
      <a routerLink="/shop/about" routerLinkActive="header__nav-link--active" (click)="closeMenu()"
        >Nosotros</a
      >
    </nav>

    <div class="header__actions">
      <a
        routerLink="/shop/cart"
        class="header__cart"
        [attr.aria-label]="
          cartItemCount() > 0
            ? 'Carrito de compras, ' + cartItemCount() + ' productos'
            : 'Carrito de compras'
        "
      >
        <i class="bi bi-bag" aria-hidden="true"></i>
        @if (cartItemCount() > 0) {
          <span class="header__cart-badge">{{ cartItemCount() }}</span>
        }
      </a>
    </div>
  </div>
</header>
