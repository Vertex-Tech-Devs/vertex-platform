<div class="modal-header modal-header--danger">
  <h4 class="modal-title">{{ title }}</h4>
  <button
    type="button"
    class="btn-close btn-close-white"
    aria-label="Cerrar"
    (click)="onCancel()"
  ></button>
</div>
<div class="modal-body confirm-modal__body">
  <p class="confirm-modal__message">{{ message }}</p>
</div>
<div class="modal-footer confirm-modal__footer">
  <button type="button" class="btn confirm-modal__btn-cancel" (click)="onCancel()">
    {{ cancelButtonText }}
  </button>
  <button type="button" class="btn confirm-modal__btn-danger" (click)="onConfirm()">
    {{ confirmButtonText }}
  </button>
</div>
