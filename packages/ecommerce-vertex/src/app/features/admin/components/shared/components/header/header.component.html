<header class="admin-header" role="banner">
  <div class="header__content">
    <div class="header__left">
      <button
        class="header__menu-toggle"
        (click)="onToggleSidebar($event)"
        aria-label="Abrir o cerrar menú lateral"
        type="button"
      >
        <i class="bi bi-list"></i>
      </button>
    </div>

    <div class="header__center">
      <a routerLink="/admin/dashboard" (click)="scrollToTop()" class="header__brand">
        @if (logoUrl()) {
          <img
            [src]="logoUrl()"
            [alt]="storeName() || 'Logo de tienda'"
            class="header__brand-logo"
          />
        } @else {
          {{ storeName() }}
        }
      </a>
    </div>

    <div class="header__right">
      <div class="dropdown">
        <button
          class="header__user-btn"
          type="button"
          id="userDropdown"
          data-bs-toggle="dropdown"
          aria-expanded="false"
        >
          <span class="header__user-name">{{ userDisplayName() }}</span>
          <i class="bi bi-person-circle header__user-icon"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-end header__dropdown" aria-labelledby="userDropdown">
          <li>
            <a class="dropdown-item header__dropdown-item" routerLink="/admin/account">
              <i class="bi bi-person-gear"></i> Mi Perfil
            </a>
          </li>
          <li><hr class="dropdown-divider header__dropdown-divider" /></li>
          <li>
            <button class="dropdown-item header__dropdown-item" (click)="logout()">
              <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
            </button>
          </li>
        </ul>
      </div>
    </div>
  </div>
</header>
