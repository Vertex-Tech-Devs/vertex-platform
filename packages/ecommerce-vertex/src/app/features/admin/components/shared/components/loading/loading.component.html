@if (isLoading()) {
  <div class="loading-overlay" role="alert" aria-busy="true" aria-label="Cargando contenido">
    <div class="loading__card">
      <div class="loading__spinner" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <p class="loading__text">Cargando datos...</p>
    </div>
  </div>
}
