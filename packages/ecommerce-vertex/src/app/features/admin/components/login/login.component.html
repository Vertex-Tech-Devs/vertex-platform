<div class="login-container">
  <div class="card-gradient-wrapper">
    <div class="card shadow-sm rounded-3">
      <div class="card-header login-card-header text-center">
        <h2 class="mb-0">Panel Administrador</h2>
      </div>

      <div class="card-body p-4">
        <h4 class="form-title text-center mb-4">Iniciar Sesión</h4>

        @if (authErrorMessage) {
          <div class="alert alert-custom alert-warning">
            {{ authErrorMessage }}
          </div>
        }

        @if (isAlreadyLogged) {
          <div class="alert alert-custom alert-info">
            Ya has iniciado sesión.
            <a href="#" (click)="logout(); $event.preventDefault()">Cerrar sesión</a> para usar otra
            cuenta.
          </div>
        }

        @if (!isAlreadyLogged) {
          <div class="login-oauth-help text-muted mb-3">
            Ingresá únicamente con tu cuenta de Google autorizada para esta tienda.
          </div>
          <div class="d-grid gap-2">
            <div class="d-grid gap-2">
              <button
                type="button"
                class="btn btn-outline-light google-btn py-2"
                (click)="onGoogleLogin()"
                [disabled]="isGoogleSubmitting"
              >
                @if (isGoogleSubmitting) {
                  <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
                } @else {
                  <i class="bi bi-google me-2"></i>
                }
                Iniciar sesión con Google
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</div>
