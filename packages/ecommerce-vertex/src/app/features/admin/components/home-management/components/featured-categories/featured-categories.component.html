<div class="glass-card mb-5 card-categories">
  <div class="card-header border-0 d-flex justify-content-between align-items-center fw-bold">
    <div><i class="bi bi-tags-fill me-2" aria-hidden="true"></i>Categorías Destacadas</div>
    <button
      type="button"
      class="btn-glass-action btn-add-success"
      (click)="add.emit()"
      [disabled]="formArray.length >= 3"
    >
      <i class="bi bi-plus-lg me-1" aria-hidden="true"></i> Añadir
    </button>
  </div>

  <div class="card-body">
    <div class="categories-scroll-wrapper">
      @for (categoryControl of formArray.controls; track categoryControl; let i = $index) {
        <div class="category-scroll-card">
          <div [formGroup]="getFormGroup(i)" class="glass-inner-card h-100 position-relative">
            <button
              type="button"
              class="btn-delete-absolute"
              (click)="remove.emit(i)"
              title="Eliminar Categoría"
            >
              <i class="bi bi-x-lg" aria-hidden="true"></i>
            </button>

            <div class="row g-3">
              <div class="col-12">
                <label [for]="'categoryName' + i" class="form-label text-label">Categoría</label>
                <select
                  [id]="'categoryName' + i"
                  class="form-select glass-input glass-select"
                  formControlName="categoryId"
                  (change)="categoryChange.emit({ index: i, event: $event })"
                >
                  <option [ngValue]="null" disabled>Elegir...</option>
                  @for (cat of categories; track cat.id) {
                    <option [value]="cat.id">{{ cat.name }}</option>
                  }
                </select>
              </div>
              <div class="col-12">
                <label class="form-label text-label d-block">Portada</label>
                <div class="category-preview-wrapper mb-3">
                  @if (previewUrls[i] || categoryControl.get('imageUrl')?.value) {
                    <img
                      [src]="previewUrls[i] || categoryControl.get('imageUrl')?.value"
                      class="img-fluid"
                    />
                  } @else {
                    <div class="no-preview-placeholder">
                      <i class="bi bi-image"></i>
                      <span>Sin imagen</span>
                    </div>
                  }
                </div>
                <label
                  [for]="'categoryImageFile' + i"
                  class="btn-glass-action btn-change-image w-100 m-0 text-center d-block"
                >
                  <i class="bi bi-upload me-2" aria-hidden="true"></i> Cambiar
                </label>
                <input
                  type="file"
                  [id]="'categoryImageFile' + i"
                  class="d-none"
                  (change)="fileChange.emit({ index: i, event: $event })"
                  accept="image/png, image/jpeg, image/webp"
                />
              </div>
            </div>
          </div>
        </div>
      }
    </div>

    @if (formArray.length === 0) {
      <div class="empty-state py-4">
        <i class="bi bi-tags empty-icon"></i>
        <p class="fs-6 mt-2 fw-bold text-soft">No hay categorías configuradas.</p>
      </div>
    }
  </div>
</div>
