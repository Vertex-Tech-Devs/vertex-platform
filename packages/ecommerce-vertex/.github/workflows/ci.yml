name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  standards-baseline:
    name: Standards Baseline Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify governance files
        run: |
          required_files=(
            ".github/CODEOWNERS"
            ".github/CONTRIBUTING.md"
            ".github/dependabot.yml"
            ".nvmrc"
            ".prettierignore"
            "SECURITY.md"
          )
          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required governance file: $file"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: standards-baseline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage/ecommerce-vertex/coverage-final.json
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate stub environment file for build check
        run: cp src/environments/environment.example.ts src/environments/environment.prod.ts

      - name: Build production
        run: npm run build

      - name: Check bundle size
        run: |
          SIZE=$(du -sk dist/ecommerce-vertex/browser | cut -f1)
          echo "Bundle size: ${SIZE}KB (limit: 5000KB)"
          [ "$SIZE" -le 5000 ] || { echo "::error::Bundle size ${SIZE}KB exceeds 5000KB limit"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/ecommerce-vertex/browser
          retention-days: 3

  functions-build:
    name: Functions Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci
        working-directory: functions

      - run: npm run build
        working-directory: functions

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Audit frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit functions
        run: npm audit --audit-level=high
        working-directory: functions
        continue-on-error: true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    outputs:
      mode: ${{ steps.e2e-mode.outputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate stub environment file
        run: cp src/environments/environment.example.ts src/environments/environment.ts

      - name: Generate stub Firebase config
        run: |
          echo '{"apiKey":"test","authDomain":"ci-stub.firebaseapp.com","projectId":"ci-stub","storageBucket":"ci-stub.appspot.com","messagingSenderId":"000000000000","appId":"1:000000000000:web:000000000000000000000000"}' > src/firebase-config.json

      - name: Mark E2E mode
        id: e2e-mode
        run: echo "mode=real" >> "$GITHUB_OUTPUT"

      - name: Start Angular dev server
        run: npm start -- --host 127.0.0.1 &
        env:
          CI: true
          NG_CLI_ANALYTICS: false

      - name: Wait for server to be ready
        run: npx wait-on http://127.0.0.1:4200 --timeout 300000

      - name: Run E2E tests
        run: npm run e2e:ci

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ github.sha }}
          path: cypress/screenshots
          retention-days: 3

  integration-tests:
    name: Integration Tests (Playwright)
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    outputs:
      mode: ${{ steps.integration-mode.outputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Mark integration mode
        id: integration-mode
        run: echo "mode=real" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright integration tests
        run: npm run test:integration

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-integration-report-${{ github.sha }}
          path: playwright-report
          retention-days: 3

  divergence-check:
    name: Divergence Check (develop vs main)
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop' || github.base_ref == 'develop'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check develop is not behind main
        run: |
          git fetch origin main develop
          DIFF=$(git diff origin/develop..origin/main -- '*.ts' '*.html' '*.scss' '*.json' 2>/dev/null | head -c 500)
          if [ -n "$DIFF" ]; then
            echo "::warning::develop está desincronizado de main. Ejecutar el Back-Merge obligatorio:"
            echo "::warning::  git checkout develop && git pull origin develop && git merge origin/main && git push origin develop"
            echo "### ⚠️ Back-Merge Pendiente" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`develop\` tiene commits de \`main\` que aún no fueron sincronizados." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "git checkout develop && git pull origin develop && git merge origin/main && git push origin develop" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ develop está sincronizado con main." >> $GITHUB_STEP_SUMMARY
          fi

  preview:
    name: Hosting Preview
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/ecommerce-vertex/browser

      - name: Check secret availability
        id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
        run: |
          [ -n "$SA" ] && echo "available=true" >> "$GITHUB_OUTPUT" || echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Deploy preview channel
        if: steps.check.outputs.available == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          projectId: ecommerce-vertex-dev
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 7d

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      [
        validate,
        unit-tests,
        build,
        functions-build,
        security-audit,
        e2e-tests,
        integration-tests,
        preview,
      ]
    if: always()
    steps:
      - name: Report and evaluate
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          REF="${PR_NUM:+PR #${PR_NUM}}"
          REF="${REF:-${REF_NAME}}"
          echo "## CI — ${REF}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.validate.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result == 'success' && needs.e2e-tests.outputs.mode == 'stub' && '⏭ Stub (no suite yet)' || needs.e2e-tests.result == 'success' && '✅ Pass' || needs.e2e-tests.result == 'skipped' && '⏭ Skipped (push)' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${{ needs.functions-build.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result == 'success' && '✅ Pass' || '⚠️ See logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && '✅ Pass' || needs.integration-tests.result == 'skipped' && '⏭ Skipped (non-main PR)' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hosting Preview | ${{ needs.preview.result == 'success' && '✅ Pass' || needs.preview.result == 'skipped' && '⏭ Skipped' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.preview.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ Hosting preview failed — merge blocked.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ E2E checks failed — merge blocked.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ Integration checks failed — merge blocked.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [[ "${{ needs.validate.result }}"        != "success" || \
                "${{ needs.unit-tests.result }}"      != "success" || \
                "${{ needs.build.result }}"           != "success" || \
                "${{ needs.functions-build.result }}" != "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ Critical checks failed — merge blocked.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ All critical checks passed.**" >> $GITHUB_STEP_SUMMARY
