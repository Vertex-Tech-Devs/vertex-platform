name: Deploy

on:
  push:
    branches: [develop, main]
  repository_dispatch:
    types: [provision-store, update-store-version]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options: [production, development]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run frontend tests
        run: npm run test:ci

      - name: Install backend dependencies
        run: npm ci
        working-directory: functions

      - name: Run backend tests
        run: npm run test
        working-directory: functions

  build-dev:
    name: Build (Development)
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/develop') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop' && inputs.environment == 'development')
    environment: development
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          cat > src/firebase-config.json << EOF
          {
            "apiKey": "$FIREBASE_API_KEY",
            "authDomain": "$FIREBASE_AUTH_DOMAIN",
            "projectId": "$FIREBASE_PROJECT_ID",
            "storageBucket": "$FIREBASE_STORAGE_BUCKET",
            "messagingSenderId": "$FIREBASE_MESSAGING_SENDER_ID",
            "appId": "$FIREBASE_APP_ID",
            "measurementId": "$FIREBASE_MEASUREMENT_ID"
          }
          EOF

      - name: Build development
        run: npm run build:dev

      - uses: actions/upload-artifact@v7
        with:
          name: dist-dev-${{ github.sha }}
          path: dist/ecommerce-vertex/browser
          retention-days: 1

  build-prod:
    name: Build (Production)
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          cat > src/firebase-config.json << EOF
          {
            "apiKey": "$FIREBASE_API_KEY",
            "authDomain": "$FIREBASE_AUTH_DOMAIN",
            "projectId": "$FIREBASE_PROJECT_ID",
            "storageBucket": "$FIREBASE_STORAGE_BUCKET",
            "messagingSenderId": "$FIREBASE_MESSAGING_SENDER_ID",
            "appId": "$FIREBASE_APP_ID",
            "measurementId": "$FIREBASE_MEASUREMENT_ID"
          }
          EOF

      - name: Build production
        run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: dist-prod-${{ github.sha }}
          path: dist/ecommerce-vertex/browser
          retention-days: 1

  functions-build:
    name: Functions Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci
        working-directory: functions

      - run: npm run build
        working-directory: functions

  deploy-dev:
    name: '→ Development'
    runs-on: ubuntu-latest
    needs: [unit-tests, build-dev, functions-build]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/develop') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop' && inputs.environment == 'development')
    environment:
      name: development
      url: https://ecommerce-vertex-dev.web.app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm ci
        working-directory: functions

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: dist-dev-${{ github.sha }}
          path: dist/ecommerce-vertex/browser

      - name: Generate functions environment file
        env:
          MERCADOPAGO_WEBHOOK_URL: ${{ secrets.MERCADOPAGO_WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          cat > functions/.env.ecommerce-vertex-dev << EOF
          MERCADOPAGO_WEBHOOK_URL=${MERCADOPAGO_WEBHOOK_URL}
          SITE_URL=${SITE_URL}
          EOF

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}'

      - name: Deploy to Firebase Development
        run: npx --yes firebase-tools deploy --project development --only hosting:ecommerce-vertex,functions --force

  deploy-prod:
    name: '→ Production'
    runs-on: ubuntu-latest
    needs: [unit-tests, build-prod, functions-build]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'production')
    environment:
      name: production
      url: https://ecommerce-vertex.web.app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm ci
        working-directory: functions

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: dist-prod-${{ github.sha }}
          path: dist/ecommerce-vertex/browser

      - name: Generate functions environment file
        env:
          MERCADOPAGO_WEBHOOK_URL: ${{ secrets.MERCADOPAGO_WEBHOOK_URL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          cat > functions/.env.ecommerce-vertex << EOF
          MERCADOPAGO_WEBHOOK_URL=${MERCADOPAGO_WEBHOOK_URL}
          SITE_URL=${SITE_URL}
          EOF

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}'

      - name: Deploy to Firebase Production
        run: npx --yes firebase-tools deploy --project production --only hosting:ecommerce-vertex,functions --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v$VERSION" --title "v$VERSION" --generate-notes || true

  provision-store:
    name: '→ Provision Store (${{ github.event.client_payload.project_id }}) [${{ github.event.client_payload.site_id || github.event.client_payload.store_id }}]'
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch' && (github.event.action == 'provision-store' || github.event.action == 'update-store-version')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'repository_dispatch' && (github.event.client_payload.ref || 'main') || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate store environment file
        env:
          FIREBASE_CONFIG: ${{ github.event.client_payload.firebase_config }}
          STORE_ID: ${{ github.event.client_payload.store_id }}
        run: |
          python3 << 'PYEOF'
          import os, json
          config = json.loads(os.environ["FIREBASE_CONFIG"])
          store_id = os.environ.get("STORE_ID", "store")
          content = """export const environment = {{
            production: true,
            tenantId: "{tenantId}",
            firebaseConfig: {{
              apiKey: "{apiKey}",
              authDomain: "{authDomain}",
              projectId: "{projectId}",
              storageBucket: "{storageBucket}",
              messagingSenderId: "{messagingSenderId}",
              appId: "{appId}"
            }},
            mercadoPago: {{
              publicKey: ""
            }},
            api: {{
              cloudFunctionsUrl: "https://us-central1-{projectId}.cloudfunctions.net"
            }},
            features: {{
              seedDataEnabled: false,
              debugLogging: false
            }}
          }};""".format(
            tenantId=store_id,
            apiKey=config["apiKey"],
            authDomain=config["authDomain"],
            projectId=config["projectId"],
            storageBucket=config["storageBucket"],
            messagingSenderId=config["messagingSenderId"],
            appId=config["appId"]
          )
          with open("src/environments/environment.prod.ts", "w") as f:
            f.write(content)

          # Write firebase-config.json so Angular fetches the correct shard
          # config at runtime instead of the hardcoded fallback in environment.ts.
          # This is what fixes "store deployed but empty" — main.ts fetches this
          # file first and uses it to initialise the Firebase SDK.
          with open("src/firebase-config.json", "w") as f:
            json.dump(config, f, indent=2)
          PYEOF

      - name: Build production
        run: npm run build

      - name: Write minimal firebase.json for store deployment
        run: |
          python3 << 'PYEOF'
          import os, json
          site_id = os.environ.get("SITE_ID", "").strip()
          payload = {
            "hosting": {
              "public": "dist/ecommerce-vertex/browser",
              "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
              "rewrites": [{ "source": "**", "destination": "/index.html" }]
            }
          }
          if site_id and site_id != "default":
              payload["hosting"]["site"] = site_id
          with open("firebase.json", "w") as f:
              json.dump(payload, f, indent=2)
          PYEOF
        env:
          SITE_ID: ${{ github.event.client_payload.site_id }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PLATFORM }}'

      - name: Deploy to store Firebase project
        run: |
          npx --yes firebase-tools deploy \
            --project '${{ github.event.client_payload.project_id }}' \
            --only hosting \
            --non-interactive

      - name: Notify platform of deployment completion
        if: always() && github.event.client_payload.platform_project_id != ''
        run: |
          DEPLOY_TOKEN="${{ github.event.client_payload.deploy_token }}"
          if [ -z "$DEPLOY_TOKEN" ]; then
            DEPLOY_TOKEN="${{ secrets.PLATFORM_DEPLOY_TOKEN }}"
          fi
          curl -s -X POST \
            "https://us-central1-${{ github.event.client_payload.platform_project_id }}.cloudfunctions.net/completeStoreDeployment" \
            -H "Content-Type: application/json" \
            -d "{\"data\": {\"storeId\": \"${{ github.event.client_payload.store_id }}\", \"success\": ${{ job.status == 'success' }}, \"deployToken\": \"$DEPLOY_TOKEN\"}}"
