version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      angular:
        patterns: ["@angular/*", "@angular-devkit/*", "@angular-eslint/*"]
      firebase:
        patterns: ["firebase*", "@angular/fire"]
      typescript-eslint:
        patterns: ["@typescript-eslint/*"]
      testing:
        patterns: ["karma*", "jasmine*", "cypress*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns: ["*"]
