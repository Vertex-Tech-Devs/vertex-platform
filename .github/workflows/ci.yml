name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Run frontend tests
        run: npm run test

      - name: Upload frontend coverage
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          files: ./coverage/vertex-platform/coverage-final.json
          fail_ci_if_error: false

      - name: Install backend dependencies
        run: npm ci
        working-directory: functions

      - name: Run backend tests
        run: npm run test
        working-directory: functions

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build production
        run: npm run build:prod

      - name: Check bundle size
        run: |
          SIZE=$(du -sk dist/vertex-platform/browser | cut -f1)
          echo "Bundle size: ${SIZE}KB (limit: 5000KB)"
          [ "$SIZE" -le 5000 ] || { echo "::error::Bundle size ${SIZE}KB exceeds 5000KB limit"; exit 1; }

      - uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/vertex-platform/browser
          retention-days: 3

  functions-build:
    name: Build Functions
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci
        working-directory: functions

      - run: npm run build
        working-directory: functions

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Audit frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit functions
        run: npm audit --audit-level=high
        working-directory: functions
        continue-on-error: true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    outputs:
      mode: ${{ steps.check-e2e.outputs.mode }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Check for E2E suite
        id: check-e2e
        run: |
          if npm run --silent 2>/dev/null | grep -q "e2e:ci"; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
            echo "mode=real" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
            echo "mode=stub" >> "$GITHUB_OUTPUT"
            echo "::notice::No e2e:ci script found — skipping E2E run."
          fi

      - name: Run E2E tests
        if: steps.check-e2e.outputs.has_e2e == 'true'
        run: npm run e2e:ci

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-screenshots-${{ github.sha }}
          path: cypress/screenshots
          retention-days: 3

  divergence-check:
    name: Divergence Check (develop vs main)
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop' || github.base_ref == 'develop'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check develop is not behind main
        run: |
          git fetch origin main develop
          DIFF=$(git diff origin/develop..origin/main -- '*.ts' '*.html' '*.scss' '*.json' 2>/dev/null | head -c 500)
          if [ -n "$DIFF" ]; then
            echo "::warning::develop está desincronizado de main. Ejecutar el Back-Merge obligatorio:"
            echo "::warning::  git checkout develop && git pull origin develop && git merge origin/main && git push origin develop"
            echo "### ⚠️ Back-Merge Pendiente" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`develop\` tiene commits de \`main\` que aún no fueron sincronizados." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "git checkout develop && git pull origin develop && git merge origin/main && git push origin develop" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ develop está sincronizado con main." >> $GITHUB_STEP_SUMMARY
          fi

  preview:
    name: Hosting Preview
    runs-on: ubuntu-latest
    needs: [unit-tests, build]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: dist/vertex-platform/browser

      - name: Check secret availability
        id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
        run: |
          [ -n "$SA" ] && echo "available=true" >> "$GITHUB_OUTPUT" || echo "available=false" >> "$GITHUB_OUTPUT"

      - name: Deploy preview channel
        if: steps.check.outputs.available == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          projectId: vertex-platform-dev
          target: dev
          channelId: pr-${{ github.event.pull_request.number }}
          expires: 7d

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [validate, unit-tests, build, functions-build, security-audit, e2e-tests, preview]
    if: always()
    steps:
      - name: Report and evaluate
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          REF="${PR_NUM:+PR #${PR_NUM}}"
          REF="${REF:-${REF_NAME}}"
          echo "## CI — ${REF}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.validate.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result == 'success' && needs.e2e-tests.outputs.mode == 'stub' && '⏭ Stub (no suite yet)' || needs.e2e-tests.result == 'success' && '✅ Pass' || needs.e2e-tests.result == 'skipped' && '⏭ Skipped (push)' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Frontend | ${{ needs.build.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Functions | ${{ needs.functions-build.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result == 'success' && '✅ Pass' || '⚠️ See logs' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hosting Preview | ${{ needs.preview.result == 'success' && '✅ Pass' || needs.preview.result == 'skipped' && '⏭ Skipped' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.preview.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ Hosting preview failed — merge blocked.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [[ "${{ needs.e2e-tests.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ E2E checks failed — merge blocked.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if [[ "${{ needs.e2e-tests.outputs.mode }}" == "stub" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**ℹ️ E2E is currently a structural stub until a real suite is added.**" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.validate.result }}"        != "success" || \
                "${{ needs.unit-tests.result }}"      != "success" || \
                "${{ needs.build.result }}"           != "success" || \
                "${{ needs.functions-build.result }}" != "success" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**❌ Critical checks failed — merge blocked.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ All critical checks passed.**" >> $GITHUB_STEP_SUMMARY
