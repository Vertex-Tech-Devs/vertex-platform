name: Deploy

on:
  push:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'production'
        type: choice
        options: [production, development]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build Contracts
        run: npm run build --workspace=@vertex/contracts

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Run frontend tests
        run: npm run test

      - name: Install backend dependencies
        run: npm ci
        working-directory: vertex-platform/functions

      - name: Run backend tests with coverage
        run: npm run test:coverage
        working-directory: vertex-platform/functions

  build-dev:
    name: Build (Development)
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/develop') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop' && inputs.environment == 'development')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build development
        run: npm run build:dev

      - uses: actions/upload-artifact@v7
        with:
          name: dist-dev-${{ github.sha }}
          path: dist/vertex-platform/browser
          retention-days: 1

  build-prod:
    name: Build (Production)
    runs-on: ubuntu-latest
    needs: validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'production')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build production
        run: npm run build:prod

      - uses: actions/upload-artifact@v7
        with:
          name: dist-prod-${{ github.sha }}
          path: dist/vertex-platform/browser
          retention-days: 1

  functions-build:
    name: Build Functions
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci
        working-directory: vertex-platform/functions

      - run: npm run build
        working-directory: vertex-platform/functions

  deploy-dev:
    name: '→ Development'
    runs-on: ubuntu-latest
    needs: [unit-tests, build-dev, functions-build]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/develop') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/develop' && inputs.environment == 'development')
    environment:
      name: development
      url: https://vertex-platform-dev.web.app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm ci
        working-directory: vertex-platform/functions

      - name: Build Functions
        run: npm run build
        working-directory: vertex-platform/functions

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: dist-dev-${{ github.sha }}
          path: dist/vertex-platform/browser

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}'

      - name: Deploy to Firebase Development
        run: |
          npx --yes firebase-tools deploy \
            --project vertex-platform-dev \
            --only hosting:dev,functions,firestore \
            --non-interactive \
            --force

  deploy-prod:
    name: '→ Production'
    runs-on: ubuntu-latest
    needs: [unit-tests, build-prod, functions-build]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.environment == 'production')
    environment:
      name: production
      url: https://vertex-platform-app.web.app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm ci
        working-directory: vertex-platform/functions

      - name: Build Functions
        run: npm run build
        working-directory: vertex-platform/functions

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: dist-prod-${{ github.sha }}
          path: dist/vertex-platform/browser

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: Deploy to Firebase Production
        run: |
          npx --yes firebase-tools deploy \
            --project vertex-platform-app \
            --only hosting:prod,functions,firestore \
            --non-interactive \
            --force
