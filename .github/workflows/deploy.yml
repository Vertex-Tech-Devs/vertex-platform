name: Deploy

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  functions-build:
    name: Build Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci
        working-directory: functions

      - run: npm run build
        working-directory: functions

  deploy-dev:
    name: "→ Development"
    runs-on: ubuntu-latest
    needs: [validate, functions-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: development
      url: https://vertex-platform-dev.web.app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm ci
        working-directory: functions

      - name: Build Functions
        run: npm run build
        working-directory: functions

      - name: Build Angular
        run: npm run build -- --configuration=development

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}'

      - name: Deploy to Firebase Development
        run: |
          npx --yes firebase-tools deploy \
            --project vertex-platform-dev \
            --only hosting:dev,functions,firestore \
            --non-interactive

  deploy-prod:
    name: "→ Production"
    runs-on: ubuntu-latest
    needs: [validate, functions-build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment:
      name: production
      url: https://vertex-platform-app.web.app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm ci
        working-directory: functions

      - name: Build Functions
        run: npm run build
        working-directory: functions

      - name: Build Angular
        run: npm run build -- --configuration=production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: Deploy to Firebase Production
        run: |
          npx --yes firebase-tools deploy \
            --project vertex-platform-app \
            --only hosting:prod,functions,firestore \
            --non-interactive
