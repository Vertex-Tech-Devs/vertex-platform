name: Git Back-Sync

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  back-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create Pull Request from main to develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin develop
          
          if git diff --quiet origin/develop..origin/main; then
            echo "No differences between main and develop. Skipping PR creation."
            exit 0
          fi
          
          existing_pr=$(gh pr list --head main --base develop --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "Pull Request from main to develop already exists: #$existing_pr"
          else
            gh pr create \
              --title "chore(git): back-sync main into develop" \
              --body "Automated Pull Request to sync changes from main back to develop branch." \
              --head main \
              --base develop
          fi
