name: Cleanup Merged Branches

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

env:
  NODE_OPTIONS: '--no-warnings'
  NPM_CONFIG_LOGLEVEL: 'error'
  NPM_CONFIG_AUDIT: 'false'
  NPM_CONFIG_FUND: 'false'

jobs:
  cleanup:
    name: Delete Head Branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Delete branch
        uses: actions/github-script@v7
        with:
          script: |
            const headRef = context.payload.pull_request.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const protectedBranches = ['main', 'develop', 'master'];
            
            if (headRef && !protectedBranches.includes(headRef)) {
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${headRef}`
                });
                console.log(`Successfully deleted merged feature branch: ${headRef}`);
              } catch (error) {
                console.error(`Failed to delete branch ${headRef}:`, error.message);
              }
            } else {
              console.log(`Branch ${headRef} is protected or undefined. Skipping deletion.`);
            }
